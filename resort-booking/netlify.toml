# Prefer root netlify.toml (base = resort-booking). Kept for local Netlify CLI runs in this folder.
[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/create-razorpay-order"
  to = "/.netlify/functions/create-razorpay-order"
  status = 200

[[redirects]]
  from = "/api/verify-razorpay-payment"
  to = "/.netlify/functions/verify-razorpay-payment"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
