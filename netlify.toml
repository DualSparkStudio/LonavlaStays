# The live app lives in resort-booking/ — do not install from repo root (peer dependency conflicts).
[build]
  base = "resort-booking"
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--no-audit"

[[redirects]]
  from = "/api/create-razorpay-order"
  to = "/.netlify/functions/create-razorpay-order"
  status = 200

[[redirects]]
  from = "/api/verify-razorpay-payment"
  to = "/.netlify/functions/verify-razorpay-payment"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
